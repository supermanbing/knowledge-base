<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>知识库 · 文档管理</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --fg: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #4f46e5;
      --accent-soft: #eef2ff;
      --green: #10b981;
      --red: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── 顶部导航 ─── */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .navbar .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px;
    }
    .navbar h1 { font-size: 17px; font-weight: 600; }

    /* ─── 主容器 ─── */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ─── 上传区域 ─── */
    .upload-zone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .upload-zone .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .upload-zone .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .upload-zone .hint {
      font-size: 13px;
      color: var(--muted);
    }
    .upload-zone input { display: none; }

    /* ─── 上传中进度条 ─── */
    .progress-bar {
      margin-top: 16px;
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }
    .progress-bar.active { display: block; }
    .progress-bar .name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .progress-bar .track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width .3s;
    }

    /* ─── 统计卡片 ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ─── 搜索栏 ─── */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface);
      outline: none;
      transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ─── 文档列表 ─── */
    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: box-shadow .2s;
    }
    .doc-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .doc-item .file-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .doc-item .info { flex: 1; min-width: 0; }
    .doc-item .info .fname {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-item .info .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .doc-item .actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .doc-item .actions button {
      width: 32px; height: 32px;
      border: none;
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .doc-item .actions button:hover { background: var(--border); }
    .doc-item .actions .del:hover { color: var(--red); }

    /* ─── 状态标签 ─── */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag.done { background: #d1fae5; color: #065f46; }
    .tag.proc { background: #fef3c7; color: #92400e; }
    .tag.err  { background: #fee2e2; color: #991b1b; }

    /* ─── 空状态 ─── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 56px; margin-bottom: 12px; }
    .empty .text { font-size: 14px; }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 100;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="logo">📚</div>
    <h1>知识库文档管理</h1>
  </nav>

  <!-- 主容器 -->
  <div class="container">

    <!-- 上传区域 -->
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📤</div>
      <div class="title">点击上传或拖拽文档到此处</div>
      <div class="hint">支持 PDF · Word · Markdown · TXT · PPT，最大 50MB</div>
      <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.md,.txt,.ppt,.pptx,.xls,.xlsx">
    </div>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar">
      <div class="name" id="progressName">正在上传...</div>
      <div class="track"><div class="fill" id="progressFill"></div></div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="totalDocs">0</div>
        <div class="label">文档总数</div>
      </div>
      <div class="stat-card">
        <div class="num" id="totalSize">0 MB</div>
        <div class="label">总大小</div>
      </div>
      <div class="stat-card">
        <div class="num" id="todayUploads">0</div>
        <div class="label">今日上传</div>
      </div>
    </div>

    <!-- 搜索 -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 搜索文档名称...">
      <button id="searchBtn">搜索</button>
    </div>

    <!-- 文档列表 -->
    <div class="doc-list" id="docList"></div>
    <div class="empty" id="emptyState">
      <div class="icon">📭</div>
      <div class="text">还没有上传任何文档</div>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
// ── 数据存储（演示用 localStorage）──
const STORAGE_KEY = 'kb_docs';

function getDocs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveDocs(docs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
}

// ── 格式/图标映射 ──
const typeIcons = {
  pdf: '📕', doc: '📘', docx: '📘', md: '📝', txt: '📄',
  ppt: '📊', pptx: '📊', xls: '📗', xlsx: '📗'
};
function getIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return typeIcons[ext] || '📎';
}
function getType(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = { pdf:'PDF', doc:'Word', docx:'Word', md:'Markdown', txt:'文本', ppt:'PPT', pptx:'PPT', xls:'Excel', xlsx:'Excel' };
  return map[ext] || '文件';
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 渲染列表 ──
function render(filter = '') {
  let docs = getDocs();
  if (filter) {
    const q = filter.toLowerCase();
    docs = docs.filter(d => d.name.toLowerCase().includes(q));
  }

  const list = document.getElementById('docList');
  const empty = document.getElementById('emptyState');

  if (docs.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.innerHTML = docs.map((d, i) => `
      <div class="doc-item">
        <div class="file-icon">${getIcon(d.name)}</div>
        <div class="info">
          <div class="fname">${d.name}</div>
          <div class="meta">${getType(d.name)} · ${formatSize(d.size)} · ${d.time}</div>
        </div>
        <div class="actions">
          <button title="下载" onclick="handleDownload(${i})">⬇</button>
          <button class="del" title="删除" onclick="handleDelete(${i})">🗑</button>
        </div>
      </div>
    `).join('');
  }

  // 更新统计
  const all = getDocs();
  document.getElementById('totalDocs').textContent = all.length;
  const totalBytes = all.reduce((s, d) => s + d.size, 0);
  document.getElementById('totalSize').textContent = formatSize(totalBytes);
  const today = new Date().toLocaleDateString('zh-CN');
  document.getElementById('todayUploads').textContent = all.filter(d => d.time.includes(today)).length;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

// ── 上传处理 ──
function handleUpload(files) {
  const docs = getDocs();
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressName = document.getElementById('progressName');

  Array.from(files).forEach((file, idx) => {
    progressBar.classList.add('active');
    progressName.textContent = `正在上传: ${file.name}`;
    
    // 模拟上传进度
    let p = 0;
    const timer = setInterval(() => {
      p += Math.random() * 20;
      if (p >= 100) {
        p = 100;
        clearInterval(timer);
        // 完成
        docs.unshift({
          name: file.name,
          size: file.size,
          time: new Date().toLocaleString('zh-CN'),
        });
        saveDocs(docs);
        render(document.getElementById('searchInput').value);
        showToast(`✅ ${file.name} 上传成功`);
        if (idx === files.length - 1) {
          setTimeout(() => progressBar.classList.remove('active'), 500);
        }
      }
      progressFill.style.width = p + '%';
    }, 200);
  });
}

// ── 事件绑定 ──
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleUpload(e.dataTransfer.files);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleUpload(fileInput.files);
  fileInput.value = '';
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  render(e.target.value);
});
document.getElementById('searchBtn').addEventListener('click', () => {
  render(document.getElementById('searchInput').value);
});

function handleDelete(index) {
  const docs = getDocs();
  const name = docs[index].name;
  docs.splice(index, 1);
  saveDocs(docs);
  render(document.getElementById('searchInput').value);
  showToast(`🗑 ${name} 已删除`);
}

function handleDownload(index) {
  const docs = getDocs();
  showToast(`📥 下载 ${docs[index].name}（演示模式）`);
}

// ── 初始渲染 ──
render();
</script>
</body>
</html>
